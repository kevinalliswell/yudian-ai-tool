name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  determine-version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.version.outputs.should_release }}
      release_sha: ${{ steps.commit.outputs.release_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: version
        shell: bash
        run: |
          latest="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          current="$(node -p "require('./package.json').version")"
          range="${latest:+$latest..HEAD}"
          commits="$(git log --format=%B $range)"
          bump="skip"
          if echo "$commits" | grep -Eq '(^|[[:space:]])BREAKING CHANGE|^[a-z]+!:'; then bump="major"; fi
          if [ "$bump" = "skip" ] && echo "$commits" | grep -Eq '^feat(\(.+\))?:'; then bump="minor"; fi
          if [ "$bump" = "skip" ] && echo "$commits" | grep -Eq '^(fix|perf|refactor)(\(.+\))?:'; then bump="patch"; fi
          if [ -z "$latest" ]; then bump="minor"; fi
          if [ "$bump" = "skip" ]; then
            echo "version=$current" >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          node - "$current" "$bump" <<'NODE'
          const fs = require('fs');
          const [current, bump] = process.argv.slice(2);
          const parts = current.split('.').map(Number);
          if (bump === 'major') { parts[0] += 1; parts[1] = 0; parts[2] = 0; }
          if (bump === 'minor') { parts[1] += 1; parts[2] = 0; }
          if (bump === 'patch') { parts[2] += 1; }
          const version = parts.join('.');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = version;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          const cargoToml = fs.readFileSync('src-tauri/Cargo.toml', 'utf8')
            .replace(/^version = ".+"$/m, `version = "${version}"`);
          fs.writeFileSync('src-tauri/Cargo.toml', cargoToml);
          const cargoLock = fs.readFileSync('src-tauri/Cargo.lock', 'utf8')
            .replace(
              /(\[\[package\]\]\nname = "yudian-ai-tool"\nversion = ").+(")/,
              `$1${version}$2`,
            );
          fs.writeFileSync('src-tauri/Cargo.lock', cargoLock);
          const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          conf.version = version;
          conf.plugins ??= {};
          conf.plugins.updater ??= {};
          conf.plugins.updater.endpoints = [
            `https://github.com/${process.env.GITHUB_REPOSITORY}/releases/latest/download/latest.json`,
          ];
          fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          fs.appendFileSync('CHANGELOG.md', `\n## v${version}\n\n- Automated release from Conventional Commits.\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\nshould_release=true\n`);
          NODE
      - name: Commit version bump
        id: commit
        if: steps.version.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json CHANGELOG.md
          git commit -m "chore(release): v${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.version }}"
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform }}
    needs: determine-version
    if: needs.determine-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    env:
      HAS_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.determine-version.outputs.release_sha }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Windows bundle
        if: matrix.platform == 'windows-latest'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.determine-version.outputs.version }}
          releaseName: 宇电 AI 温控工具 v${{ needs.determine-version.outputs.version }}
          releaseBody: Automated desktop release.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
      - name: Build unsigned macOS bundle
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_CERTIFICATE != 'true'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.determine-version.outputs.version }}
          releaseName: 宇电 AI 温控工具 v${{ needs.determine-version.outputs.version }}
          releaseBody: Automated desktop release.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
      - name: Build signed macOS bundle
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_CERTIFICATE == 'true'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v${{ needs.determine-version.outputs.version }}
          releaseName: 宇电 AI 温控工具 v${{ needs.determine-version.outputs.version }}
          releaseBody: Automated desktop release.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
