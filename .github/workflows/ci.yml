name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint and test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Frontend lint
        run: pnpm lint
      - name: Frontend test
        run: pnpm test
      - name: Frontend build
        run: pnpm build
      - name: Rust format
        working-directory: src-tauri
        run: cargo fmt --check
      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
      - name: Rust test
        working-directory: src-tauri
        run: cargo test
